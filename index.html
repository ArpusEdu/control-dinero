<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Dinero</title>
<style>
  :root {
    --bg: #f6f6f4;
    --surface: #ffffff;
    --ink: #1a1a18;
    --muted: #8a8a82;
    --line: #e8e8e3;
    --in: #2e7d4f;
    --in-soft: #e8f3ec;
    --out: #c0392b;
    --out-soft: #fbeae8;
    --accent: #1a1a18;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.05);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
    padding: 32px 16px 80px;
  }

  .wrap { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-start; }
  header h1 { font-size: 26px; font-weight: 650; letter-spacing: -0.02em; }
  header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .btn-print {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s;
  }
  .btn-print:hover { background: var(--bg); }

  .btn-clear-all {
    border: 1px solid #e8e8e3;
    background: #fff;
    color: var(--out);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 4px;
    transition: background .15s, border-color .15s;
  }
  .btn-clear-all:hover { background: var(--out-soft); border-color: var(--out); }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
  }
  .card .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
  }
  .card .value {
    font-size: 22px;
    font-weight: 650;
    margin-top: 8px;
    letter-spacing: -0.01em;
    word-break: break-word;
  }
  .card.entradas .value { color: var(--in); }
  .card.salidas .value  { color: var(--out); }
  .card.saldo { background: var(--accent); border-color: var(--accent); }
  .card.saldo .label { color: rgba(255,255,255,.6); }
  .card.saldo .value { color: #fff; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
  }

  .toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    background: var(--bg);
    border-radius: 12px;
    padding: 5px;
    margin-bottom: 18px;
  }
  .toggle button {
    border: none;
    background: transparent;
    padding: 11px;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: all .18s ease;
    font-family: inherit;
  }
  .toggle button.active.in  { background: var(--in);  color: #fff; }
  .toggle button.active.out { background: var(--out); color: #fff; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
  .field input, .field textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
    transition: border-color .15s, background .15s;
  }
  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--ink);
    background: #fff;
  }
  .field textarea { resize: vertical; min-height: 54px; }
  .row { display: grid; grid-template-columns: 1.3fr 1fr; gap: 14px; }

  .submit {
    width: 100%;
    border: none;
    background: var(--accent);
    color: #fff;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s, transform .05s;
  }
  .submit:hover { opacity: .9; }
  .submit:active { transform: scale(.99); }

  .list-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .list-head h2 { font-size: 16px; font-weight: 650; }
  .list-head .count { font-size: 13px; color: var(--muted); }

  .filters { display: flex; gap: 6px; margin-bottom: 14px; padding: 0 4px; }
  .filters button {
    border: 1px solid var(--line);
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    font-family: inherit;
    transition: all .15s;
  }
  .filters button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .movs { display: flex; flex-direction: column; gap: 10px; }

  .mov {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
    animation: pop .25s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .dot {
    width: 38px; height: 38px;
    border-radius: 11px;
    flex-shrink: 0;
    display: grid; place-items: center;
    font-size: 18px; font-weight: 700;
  }
  .dot.in  { background: var(--in-soft);  color: var(--in); }
  .dot.out { background: var(--out-soft); color: var(--out); }

  .mov-info { flex: 1; min-width: 0; }
  .mov-info .desc { font-size: 15px; font-weight: 600; word-break: break-word; }
  .mov-info .meta { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  .mov-amount { font-size: 16px; font-weight: 650; white-space: nowrap; }
  .mov-amount.in  { color: var(--in); }
  .mov-amount.out { color: var(--out); }

  .del {
    border: none; background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px 6px;
    border-radius: 8px;
    line-height: 1;
    opacity: .5;
    transition: opacity .15s, color .15s;
  }
  .del:hover { opacity: 1; color: var(--out); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 48px 20px;
    font-size: 14px;
  }

  /* Préstamos */
  .section-divider {
    border: none; border-top: 1px solid var(--line);
    margin: 36px 0 28px;
  }
  .loan {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    animation: pop .25s ease;
    transition: opacity .2s;
  }
  .loan.paid { opacity: .45; }
  .loan-dot {
    width: 38px; height: 38px;
    border-radius: 11px;
    flex-shrink: 0;
    display: grid; place-items: center;
    font-size: 16px;
    background: #ede9fe; color: #6d28d9;
  }
  .loan.paid .loan-dot { background: var(--in-soft); color: var(--in); }
  .loan-info { flex: 1; min-width: 0; }
  .loan-info .persona { font-size: 15px; font-weight: 600; }
  .loan-info .meta { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .loan-amount { font-size: 16px; font-weight: 650; white-space: nowrap; color: #6d28d9; }
  .loan.paid .loan-amount { color: var(--in); text-decoration: line-through; }
  .badge-paid {
    font-size: 11px; font-weight: 700;
    background: var(--in-soft); color: var(--in);
    border-radius: 99px; padding: 2px 8px;
    white-space: nowrap;
  }
  .btn-cobrado {
    border: 1px solid #ede9fe; background: #faf8ff;
    color: #6d28d9; padding: 5px 10px;
    border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; white-space: nowrap;
    transition: background .15s;
  }
  .btn-cobrado:hover { background: #ede9fe; }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--ink);
    color: #fff;
    padding: 9px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    z-index: 99;
  }
  .toast.show { opacity: 1; }

  .print-report { display: none; }

  @media print {
    body { background: #fff; padding: 0; font-size: 12px; }
    .wrap > *:not(.print-report) { display: none !important; }
    .print-report { display: block; }

    .pr-header { border-bottom: 2px solid #1a1a18; padding-bottom: 10px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-end; }
    .pr-header h1 { font-size: 18px; font-weight: 700; }
    .pr-header .pr-date { font-size: 11px; color: #666; }

    .pr-totals { display: flex; gap: 24px; margin-bottom: 16px; }
    .pr-total { text-align: center; }
    .pr-total .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: #666; }
    .pr-total .val { font-size: 16px; font-weight: 700; margin-top: 2px; }
    .pr-total.in .val  { color: #2e7d4f; }
    .pr-total.out .val { color: #c0392b; }
    .pr-total.bal .val { color: #1a1a18; }

    .pr-table { width: 100%; border-collapse: collapse; }
    .pr-table th { background: #1a1a18; color: #fff; text-align: left; padding: 7px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .pr-table td { padding: 7px 10px; border-bottom: 1px solid #e8e8e3; font-size: 12px; vertical-align: middle; }
    .pr-table tr:nth-child(even) td { background: #f9f9f7; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .pr-table .amt-in  { color: #2e7d4f; font-weight: 600; text-align: right; }
    .pr-table .amt-out { color: #c0392b; font-weight: 600; text-align: right; }
    .pr-table td.date  { color: #666; white-space: nowrap; }
    .pr-table tfoot td { font-weight: 700; border-top: 2px solid #1a1a18; border-bottom: none; }
  }

  @media (max-width: 560px) {
    .summary { grid-template-columns: 1fr; }
    .row { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Control de Dinero</h1>
      <p>Registra cada entrada y salida con su justificación.</p>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;margin-top:4px">
      <button class="btn-print" onclick="window.print()">Imprimir</button>
      <button class="btn-clear-all" onclick="borrarTodo()">Borrar todo</button>
    </div>
  </header>

  <div class="summary">
    <div class="card entradas">
      <div class="label">Entradas</div>
      <div class="value" id="totalIn">$0</div>
    </div>
    <div class="card salidas">
      <div class="label">Salidas</div>
      <div class="value" id="totalOut">$0</div>
    </div>
    <div class="card saldo">
      <div class="label">Saldo</div>
      <div class="value" id="saldo">$0</div>
    </div>
  </div>

  <div class="form-card">
    <div class="toggle">
      <button id="btnIn" class="active in" onclick="setTipo('in')">＋ Entrada</button>
      <button id="btnOut" class="out" onclick="setTipo('out')">－ Salida</button>
    </div>
    <div class="row">
      <div class="field">
        <label for="monto">Monto</label>
        <input type="number" id="monto" inputmode="decimal" placeholder="0" min="0" step="any">
      </div>
      <div class="field">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha">
      </div>
    </div>
    <div class="field">
      <label for="desc">Justificación · ¿de qué es esta plata?</label>
      <textarea id="desc" placeholder="Ej: Pago de freelance, mercado de la quincena..."></textarea>
    </div>
    <button class="submit" onclick="agregar()">Registrar movimiento</button>
  </div>

  <div class="list-head">
    <h2>Movimientos</h2>
    <span class="count" id="count"></span>
  </div>

  <div class="filters">
    <button class="active" onclick="setFiltro('all', this)">Todos</button>
    <button onclick="setFiltro('in', this)">Entradas</button>
    <button onclick="setFiltro('out', this)">Salidas</button>
  </div>

  <div class="movs" id="movs"></div>

  <!-- Préstamos -->
  <hr class="section-divider">

  <div class="list-head">
    <h2>Préstamos por cobrar</h2>
    <span class="count" id="loans-count"></span>
  </div>

  <div class="form-card" style="margin-bottom:20px">
    <div class="row">
      <div class="field">
        <label for="p-persona">¿A quién le presté?</label>
        <input type="text" id="p-persona" placeholder="Nombre de la persona">
      </div>
      <div class="field">
        <label for="p-monto">Monto prestado</label>
        <input type="number" id="p-monto" inputmode="decimal" placeholder="0" min="0" step="any">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="p-fecha">Fecha del préstamo</label>
        <input type="date" id="p-fecha">
      </div>
      <div class="field">
        <label for="p-nota">Nota (opcional)</label>
        <input type="text" id="p-nota" placeholder="Ej: para el arriendo">
      </div>
    </div>
    <button class="submit" onclick="agregarPrestamo()">Registrar préstamo</button>
  </div>

  <div class="movs" id="loans-list"></div>

  <!-- Solo visible al imprimir -->
  <div class="print-report" id="print-report"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
  // ─── CONFIGURACIÓN FIREBASE ───────────────────────────────────────────────
  // Crea tu BD gratis en https://console.firebase.google.com
  // Proyecto → Realtime Database → Crear (modo prueba) → copia los datos:
  const FIREBASE_CONFIG = {
    apiKey:      "AIzaSyDpyIzrv0eTeRKAm-ma5n_RY7Gn0m36m08",
    databaseURL: "https://control-dinero-app-default-rtdb.firebaseio.com",
    projectId:   "control-dinero-app",
  };
  // ─────────────────────────────────────────────────────────────────────────

  let movimientos = [];
  let prestamos = [];
  let tipo = 'in';
  let filtro = 'all';

  const fmt = n => '$' + Number(n).toLocaleString('es-CO', { maximumFractionDigits: 0 });

  document.getElementById('fecha').valueAsDate = new Date();
  document.getElementById('p-fecha').valueAsDate = new Date();

  let toastTimer;
  function toast(msg, dur = 2000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), dur);
  }

  // ── Inicialización ─────────────────────────────────────────────────────────
  firebase.initializeApp(FIREBASE_CONFIG);
  const dbRef = firebase.database().ref('movimientos');
  const loansRef = firebase.database().ref('prestamos');

  dbRef.on('value', snap => {
    const data = snap.val() || {};
    movimientos = Object.values(data).sort((a, b) => b.id - a.id);
    render();
  });

  loansRef.on('value', snap => {
    const data = snap.val() || {};
    prestamos = Object.values(data).sort((a, b) => b.id - a.id);
    renderPrestamos();
    render(); // actualiza también el print report con los préstamos
  });

  // ── UI ────────────────────────────────────────────────────────────────────
  function setTipo(t) {
    tipo = t;
    document.getElementById('btnIn').classList.toggle('active', t === 'in');
    document.getElementById('btnOut').classList.toggle('active', t === 'out');
  }

  function setFiltro(f, el) {
    filtro = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  // ── Operaciones ───────────────────────────────────────────────────────────
  async function agregar() {
    const monto = parseFloat(document.getElementById('monto').value);
    const desc  = document.getElementById('desc').value.trim();
    const fecha = document.getElementById('fecha').value;

    if (!monto || monto <= 0) { alert('Pon un monto válido.'); return; }
    if (!desc)                 { alert('Escribe de qué es esta plata.'); return; }

    const mov = {
      id: Date.now(), tipo, monto, desc,
      fecha: fecha || new Date().toISOString().slice(0, 10)
    };

    document.getElementById('monto').value = '';
    document.getElementById('desc').value  = '';

    await dbRef.child(String(mov.id)).set(mov);
    toast('Guardado ✓');
  }

  async function eliminar(id) {
    if (!confirm('¿Eliminar este movimiento?')) return;
    await dbRef.child(String(id)).remove();
    toast('Eliminado');
  }

  async function borrarTodo() {
    if (!movimientos.length) return;
    if (!confirm('¿Borrar TODOS los movimientos? Esta acción no se puede deshacer.')) return;
    await dbRef.remove();
    toast('Todo borrado');
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function fechaTexto(f) {
    return new Date(f + 'T00:00:00').toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function escapar(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render() {
    const totalIn  = movimientos.filter(m => m.tipo === 'in').reduce((s, m) => s + m.monto, 0);
    const totalOut = movimientos.filter(m => m.tipo === 'out').reduce((s, m) => s + m.monto, 0);

    document.getElementById('totalIn').textContent  = fmt(totalIn);
    document.getElementById('totalOut').textContent = fmt(totalOut);
    document.getElementById('saldo').textContent    = fmt(totalIn - totalOut);

    const lista = filtro === 'all' ? movimientos : movimientos.filter(m => m.tipo === filtro);
    document.getElementById('count').textContent = movimientos.length ? movimientos.length + ' en total' : '';

    const cont = document.getElementById('movs');
    if (!lista.length) {
      cont.innerHTML = '<div class="empty">No hay movimientos todavía.<br>Registra el primero arriba.</div>';
    } else {
      cont.innerHTML = lista.map(m => `
        <div class="mov">
          <div class="dot ${m.tipo}">${m.tipo === 'in' ? '↓' : '↑'}</div>
          <div class="mov-info">
            <div class="desc">${escapar(m.desc)}</div>
            <div class="meta">${fechaTexto(m.fecha)}</div>
          </div>
          <div class="mov-amount ${m.tipo}">${m.tipo === 'in' ? '+' : '−'}${fmt(m.monto)}</div>
          <button class="del" onclick="eliminar(${m.id})" title="Eliminar">×</button>
        </div>
      `).join('');
    }

    // Reporte de impresión
    const filas = movimientos.map(m => `
      <tr>
        <td class="date">${fechaTexto(m.fecha)}</td>
        <td>${escapar(m.desc)}</td>
        <td class="${m.tipo === 'in' ? 'amt-in' : 'amt-out'}">${m.tipo === 'in' ? '+' : '−'}${fmt(m.monto)}</td>
      </tr>
    `).join('');

    buildPrintReport(totalIn, totalOut, filas);
  }

  function buildPrintReport(totalIn, totalOut, filasMovs) {
    const pendientes = prestamos.filter(p => !p.pagado);
    const totalPrestado = pendientes.reduce((s, p) => s + p.monto, 0);
    const filasLoans = prestamos.map(p => `
      <tr>
        <td class="date">${fechaTexto(p.fecha)}</td>
        <td>${escapar(p.persona)}${p.nota ? ' <span style="color:#888">· ' + escapar(p.nota) + '</span>' : ''}</td>
        <td style="color:#6d28d9;font-weight:600;text-align:right${p.pagado ? ';text-decoration:line-through;color:#2e7d4f' : ''}">${fmt(p.monto)}</td>
        <td style="text-align:center;font-size:11px">${p.pagado ? 'Cobrado' : 'Pendiente'}</td>
      </tr>
    `).join('');

    document.getElementById('print-report').innerHTML = `
      <div class="pr-header">
        <div><h1>Control de Dinero</h1></div>
        <div class="pr-date">Generado el ${new Date().toLocaleDateString('es-CO', {day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      <div class="pr-totals">
        <div class="pr-total in"><div class="lbl">Entradas</div><div class="val">${fmt(totalIn)}</div></div>
        <div class="pr-total out"><div class="lbl">Salidas</div><div class="val">${fmt(totalOut)}</div></div>
        <div class="pr-total bal"><div class="lbl">Saldo</div><div class="val">${fmt(totalIn - totalOut)}</div></div>
        ${totalPrestado > 0 ? `<div class="pr-total" style="color:#6d28d9"><div class="lbl">Por cobrar</div><div class="val" style="color:#6d28d9">${fmt(totalPrestado)}</div></div>` : ''}
      </div>
      <table class="pr-table">
        <thead><tr><th>Fecha</th><th>Descripción</th><th style="text-align:right">Monto</th></tr></thead>
        <tbody>${filasMovs}</tbody>
        <tfoot><tr><td colspan="2">Total</td><td class="${(totalIn-totalOut)>=0?'amt-in':'amt-out'}" style="text-align:right">${fmt(totalIn-totalOut)}</td></tr></tfoot>
      </table>
      ${prestamos.length ? `
      <div style="margin-top:24px">
        <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;color:#6d28d9">Préstamos</div>
        <table class="pr-table">
          <thead><tr><th>Fecha</th><th>Persona · Nota</th><th style="text-align:right">Monto</th><th style="text-align:center">Estado</th></tr></thead>
          <tbody>${filasLoans}</tbody>
          <tfoot><tr><td colspan="2">Por cobrar</td><td style="text-align:right;color:#6d28d9;font-weight:700">${fmt(totalPrestado)}</td><td></td></tr></tfoot>
        </table>
      </div>` : ''}
    `;
  }

  // ── Préstamos ─────────────────────────────────────────────────────────────
  async function agregarPrestamo() {
    const persona = document.getElementById('p-persona').value.trim();
    const monto   = parseFloat(document.getElementById('p-monto').value);
    const fecha   = document.getElementById('p-fecha').value;
    const nota    = document.getElementById('p-nota').value.trim();

    if (!persona) { alert('Escribe el nombre de la persona.'); return; }
    if (!monto || monto <= 0) { alert('Pon un monto válido.'); return; }

    const p = {
      id: Date.now(), persona, monto, nota,
      fecha: fecha || new Date().toISOString().slice(0, 10),
      pagado: false
    };

    document.getElementById('p-persona').value = '';
    document.getElementById('p-monto').value   = '';
    document.getElementById('p-nota').value    = '';

    await loansRef.child(String(p.id)).set(p);
    toast('Préstamo registrado ✓');
  }

  async function marcarPagado(id) {
    const p = prestamos.find(x => x.id === id);
    if (!p) return;
    await loansRef.child(String(id)).update({ pagado: !p.pagado });
    toast(p.pagado ? 'Marcado como pendiente' : 'Marcado como cobrado ✓');
  }

  async function eliminarPrestamo(id) {
    if (!confirm('¿Eliminar este préstamo?')) return;
    await loansRef.child(String(id)).remove();
    toast('Eliminado');
  }

  function renderPrestamos() {
    const pendientes = prestamos.filter(p => !p.pagado);
    const total = pendientes.reduce((s, p) => s + p.monto, 0);
    document.getElementById('loans-count').textContent =
      prestamos.length ? `${pendientes.length} pendiente${pendientes.length !== 1 ? 's' : ''} · ${fmt(total)}` : '';

    const cont = document.getElementById('loans-list');
    if (!prestamos.length) {
      cont.innerHTML = '<div class="empty">Sin préstamos registrados.</div>';
      return;
    }

    cont.innerHTML = prestamos.map(p => `
      <div class="loan${p.pagado ? ' paid' : ''}">
        <div class="loan-dot">${p.pagado ? '✓' : '🤝'}</div>
        <div class="loan-info">
          <div class="persona">${escapar(p.persona)}${p.nota ? ' <span style="font-weight:400;color:var(--muted)">· ' + escapar(p.nota) + '</span>' : ''}</div>
          <div class="meta">${fechaTexto(p.fecha)}</div>
        </div>
        <div class="loan-amount">${fmt(p.monto)}</div>
        ${p.pagado
          ? '<span class="badge-paid">Cobrado</span>'
          : `<button class="btn-cobrado" onclick="marcarPagado(${p.id})">Cobrado</button>`}
        <button class="del" onclick="eliminarPrestamo(${p.id})" title="Eliminar">×</button>
      </div>
    `).join('');
  }
</script>
</body>
</html>
